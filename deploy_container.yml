---
- hosts: web
  become: yes

  tasks:
    - name: Pull latest Docker image
      shell: docker pull nitin52050/node-app:v1

    - name: Remove old container if it exists
      shell: docker rm -f node-app || true

    - name: Run new container
      shell: docker run -d --name node-app -p 3000:3000 nitin52050/node-app:v1
